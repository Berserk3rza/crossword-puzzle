<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crossword Puzzle</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a365d 0%, #2c5282 50%, #2b6cb0 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .puzzle-container {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            display: inline-block;
        }

        .crossword-grid {
            display: inline-block;
            border: 3px solid #2c5282;
            background: #1a365d;
        }

        .row {
            display: flex;
        }

        .cell {
            width: clamp(32px, 6vw, 44px);
            height: clamp(32px, 6vw, 44px);
            position: relative;
        }

        .cell.blank {
            background: #1a365d;
        }

        .cell.active {
            background: white;
            border: 1px solid #cbd5e0;
        }

        .cell.active:hover {
            background: #ebf8ff;
        }

        .cell.active.selected {
            background: #bee3f8;
        }

        .cell.active.highlighted {
            background: #e9d8fd;
        }

        .cell-number {
            position: absolute;
            top: 1px;
            left: 2px;
            font-size: clamp(9px, 1.8vw, 12px);
            font-weight: bold;
            color: #2c5282;
            pointer-events: none;
            z-index: 1;
        }

        .cell input {
            width: 100%;
            height: 100%;
            border: none;
            text-align: center;
            font-size: clamp(16px, 3vw, 22px);
            font-weight: bold;
            text-transform: uppercase;
            background: transparent;
            color: #2d3748;
            padding: 0;
            caret-color: #2c5282;
        }

        .cell input:focus {
            outline: none;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 15px;
            justify-content: center;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #2c5282, #2b6cb0);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(44, 82, 130, 0.4);
        }

        .btn-secondary {
            background: #edf2f7;
            color: #4a5568;
        }

        .btn-secondary:hover {
            background: #e2e8f0;
        }

        .status-bar {
            background: #edf2f7;
            border-radius: 8px;
            padding: 12px;
            margin-top: 15px;
            text-align: center;
        }

        .progress {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .progress-bar {
            width: 150px;
            height: 8px;
            background: #cbd5e0;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #38a169, #48bb78);
            transition: width 0.3s ease;
            border-radius: 4px;
        }

        .progress-text {
            font-weight: 600;
            color: #4a5568;
            font-size: 0.9rem;
        }

        @media (max-width: 500px) {
            body {
                padding: 10px;
            }

            .puzzle-container {
                padding: 12px;
            }

            .controls {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="puzzle-container">
        <div id="crossword-grid" class="crossword-grid"></div>
        
        <div class="controls">
            <button class="btn btn-secondary" onclick="clearAll()">Clear All</button>
            <button class="btn btn-primary" onclick="resetPuzzle()">Reset</button>
        </div>

        <div class="status-bar">
            <div class="progress">
                <span class="progress-text"><span id="filled-count">0</span> / <span id="total-count">0</span> letters</span>
                <div class="progress-bar">
                    <div id="progress-fill" class="progress-fill" style="width: 0%"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const puzzleData = {
            gridSize: 17,
            words: [
                { word: "REPOSSESSION", row: 0, col: 5, direction: "across", number: 1 },
                { word: "ENVIRONMENTAL", row: 0, col: 6, direction: "down", number: 2 },
                { word: "FIXERUPPER", row: 4, col: 2, direction: "across", number: 3 },
                { word: "DEED", row: 8, col: 5, direction: "across", number: 4 },
                { word: "TITLE", row: 8, col: 10, direction: "down", number: 5 },
                { word: "ESCROW", row: 10, col: 8, direction: "down", number: 6 },
                { word: "APPRAISAL", row: 11, col: 2, direction: "across", number: 7 },
                { word: "LANDLORD", row: 14, col: 3, direction: "across", number: 8 }
            ]
        };

        let grid = [];
        let currentCell = null;
        let currentDirection = "across";
        let currentWord = null;

        function initPuzzle() {
            createGrid();
            placeWords();
            renderGrid();
            updateProgress();
        }

        function createGrid() {
            grid = [];
            for (let r = 0; r < puzzleData.gridSize; r++) {
                grid[r] = [];
                for (let c = 0; c < puzzleData.gridSize; c++) {
                    grid[r][c] = {
                        letter: null,
                        userLetter: "",
                        isActive: false,
                        number: null,
                        acrossWord: null,
                        downWord: null
                    };
                }
            }
        }

        function placeWords() {
            puzzleData.words.forEach(wordData => {
                const { word, row, col, direction, number } = wordData;
                
                for (let i = 0; i < word.length; i++) {
                    const r = direction === "across" ? row : row + i;
                    const c = direction === "across" ? col + i : col;
                    
                    if (r < puzzleData.gridSize && c < puzzleData.gridSize) {
                        grid[r][c].letter = word[i];
                        grid[r][c].isActive = true;
                        
                        if (direction === "across") {
                            grid[r][c].acrossWord = wordData;
                        } else {
                            grid[r][c].downWord = wordData;
                        }
                        
                        if (i === 0) {
                            grid[r][c].number = number;
                        }
                    }
                }
            });
        }

        function renderGrid() {
            const container = document.getElementById("crossword-grid");
            container.innerHTML = "";

            let minRow = puzzleData.gridSize, maxRow = 0;
            let minCol = puzzleData.gridSize, maxCol = 0;

            for (let r = 0; r < puzzleData.gridSize; r++) {
                for (let c = 0; c < puzzleData.gridSize; c++) {
                    if (grid[r][c].isActive) {
                        minRow = Math.min(minRow, r);
                        maxRow = Math.max(maxRow, r);
                        minCol = Math.min(minCol, c);
                        maxCol = Math.max(maxCol, c);
                    }
                }
            }

            for (let r = minRow; r <= maxRow; r++) {
                const rowDiv = document.createElement("div");
                rowDiv.className = "row";

                for (let c = minCol; c <= maxCol; c++) {
                    const cellDiv = document.createElement("div");
                    cellDiv.className = "cell";
                    cellDiv.dataset.row = r;
                    cellDiv.dataset.col = c;

                    if (grid[r][c].isActive) {
                        cellDiv.classList.add("active");

                        if (grid[r][c].number) {
                            const numberSpan = document.createElement("span");
                            numberSpan.className = "cell-number";
                            numberSpan.textContent = grid[r][c].number;
                            cellDiv.appendChild(numberSpan);
                        }

                        const input = document.createElement("input");
                        input.type = "text";
                        input.maxLength = 1;
                        input.value = grid[r][c].userLetter;
                        input.dataset.row = r;
                        input.dataset.col = c;

                        input.addEventListener("focus", handleFocus);
                        input.addEventListener("input", handleInput);
                        input.addEventListener("keydown", handleKeydown);
                        input.addEventListener("click", handleClick);

                        cellDiv.appendChild(input);
                    } else {
                        cellDiv.classList.add("blank");
                    }

                    rowDiv.appendChild(cellDiv);
                }

                container.appendChild(rowDiv);
            }
        }

        function handleFocus(e) {
            const row = parseInt(e.target.dataset.row);
            const col = parseInt(e.target.dataset.col);
            selectCell(row, col);
        }

        function handleClick(e) {
            const row = parseInt(e.target.dataset.row);
            const col = parseInt(e.target.dataset.col);
            
            if (currentCell && currentCell.row === row && currentCell.col === col) {
                if (grid[row][col].acrossWord && grid[row][col].downWord) {
                    currentDirection = currentDirection === "across" ? "down" : "across";
                    highlightCurrentWord();
                }
            }
        }

        function handleInput(e) {
            const row = parseInt(e.target.dataset.row);
            const col = parseInt(e.target.dataset.col);
            const value = e.target.value.toUpperCase();

            grid[row][col].userLetter = value;
            e.target.value = value;

            updateProgress();

            if (value) {
                moveToNextCell(row, col);
            }
        }

        function handleKeydown(e) {
            const row = parseInt(e.target.dataset.row);
            const col = parseInt(e.target.dataset.col);

            switch (e.key) {
                case "ArrowUp":
                    e.preventDefault();
                    moveTo(row - 1, col);
                    break;
                case "ArrowDown":
                    e.preventDefault();
                    moveTo(row + 1, col);
                    break;
                case "ArrowLeft":
                    e.preventDefault();
                    moveTo(row, col - 1);
                    break;
                case "ArrowRight":
                    e.preventDefault();
                    moveTo(row, col + 1);
                    break;
                case "Tab":
                    e.preventDefault();
                    currentDirection = currentDirection === "across" ? "down" : "across";
                    highlightCurrentWord();
                    break;
                case "Backspace":
                    if (!e.target.value) {
                        e.preventDefault();
                        moveToPrevCell(row, col);
                    }
                    break;
            }
        }

        function selectCell(row, col) {
            currentCell = { row, col };

            const cell = grid[row][col];
            if (cell.acrossWord && !cell.downWord) {
                currentDirection = "across";
            } else if (!cell.acrossWord && cell.downWord) {
                currentDirection = "down";
            }

            highlightCurrentWord();
        }

        function highlightCurrentWord() {
            document.querySelectorAll(".cell.active").forEach(cell => {
                cell.classList.remove("selected", "highlighted");
            });

            if (!currentCell) return;

            const cell = grid[currentCell.row][currentCell.col];
            currentWord = currentDirection === "across" ? cell.acrossWord : cell.downWord;

            if (!currentWord) {
                currentWord = cell.acrossWord || cell.downWord;
                currentDirection = currentWord === cell.acrossWord ? "across" : "down";
            }

            if (currentWord) {
                for (let i = 0; i < currentWord.word.length; i++) {
                    const r = currentWord.direction === "across" ? currentWord.row : currentWord.row + i;
                    const c = currentWord.direction === "across" ? currentWord.col + i : currentWord.col;
                    
                    const cellEl = document.querySelector(`.cell[data-row="${r}"][data-col="${c}"]`);
                    if (cellEl) {
                        cellEl.classList.add("highlighted");
                    }
                }

                const currentCellEl = document.querySelector(`.cell[data-row="${currentCell.row}"][data-col="${currentCell.col}"]`);
                if (currentCellEl) {
                    currentCellEl.classList.add("selected");
                }
            }
        }

        function moveTo(row, col) {
            if (row >= 0 && row < puzzleData.gridSize && col >= 0 && col < puzzleData.gridSize) {
                if (grid[row][col].isActive) {
                    const input = document.querySelector(`input[data-row="${row}"][data-col="${col}"]`);
                    if (input) {
                        input.focus();
                    }
                }
            }
        }

        function moveToNextCell(row, col) {
            if (currentDirection === "across") {
                moveTo(row, col + 1);
            } else {
                moveTo(row + 1, col);
            }
        }

        function moveToPrevCell(row, col) {
            if (currentDirection === "across") {
                moveTo(row, col - 1);
            } else {
                moveTo(row - 1, col);
            }
        }

        function updateProgress() {
            let filled = 0;
            let total = 0;

            for (let r = 0; r < puzzleData.gridSize; r++) {
                for (let c = 0; c < puzzleData.gridSize; c++) {
                    if (grid[r][c].isActive) {
                        total++;
                        if (grid[r][c].userLetter) filled++;
                    }
                }
            }

            document.getElementById("filled-count").textContent = filled;
            document.getElementById("total-count").textContent = total;
            document.getElementById("progress-fill").style.width = `${(filled / total) * 100}%`;
        }

        function clearAll() {
            for (let r = 0; r < puzzleData.gridSize; r++) {
                for (let c = 0; c < puzzleData.gridSize; c++) {
                    if (grid[r][c].isActive) {
                        grid[r][c].userLetter = "";
                        const input = document.querySelector(`input[data-row="${r}"][data-col="${c}"]`);
                        if (input) {
                            input.value = "";
                        }
                    }
                }
            }
            updateProgress();
        }

        function resetPuzzle() {
            clearAll();
            currentCell = null;
            currentWord = null;
            document.querySelectorAll(".cell.active").forEach(cell => {
                cell.classList.remove("selected", "highlighted");
            });
        }

        document.addEventListener("DOMContentLoaded", initPuzzle);
    </script>
</body>
</html>
